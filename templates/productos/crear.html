{% extends "base.html" %}

{% block title %}Nuevo Producto{% endblock %}

{% block content %}
<h2><i class="fas fa-plus"></i> Nuevo Producto</h2>

<div class="card mt-3">
    <div class="card-body">
        <form method="POST" action="{{ url_for('productos.crear') }}">
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Código de Barras</label>
                    <input type="text" class="form-control" name="codigo_barras" placeholder="Código de barras">
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Nombre *</label>
                    <input type="text" class="form-control" name="nombre" required>
                </div>
            </div>
            
            <div class="row">
                <div class="col-md-12 mb-3">
                    <label class="form-label">Descripción</label>
                    <textarea class="form-control" name="descripcion" rows="2"></textarea>
                </div>
            </div>
            <div class="row">
            <div class="col-md-12 mb-3">
                <label class="form-label">Imagen del Producto</label>
                <input type="file" class="form-control" name="imagen" accept="image/*">
                <small class="text-muted">Formatos: JPG, PNG, GIF. Tamaño máximo: 5MB</small>
            </div>
            </div>
            <div class="row">
                <div class="col-md-4 mb-3">
                    <label class="form-label">Marca</label>
                    <select class="form-select" name="id_marca">
                        <option value="">Seleccionar marca...</option>
                        {% for marca in marcas %}
                        <option value="{{ marca.id_marca }}">{{ marca.nombre }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-4 mb-3">
                    <label class="form-label">Categoría</label>
                    <select class="form-select" name="id_categoria">
                        <option value="">Seleccionar categoría...</option>
                        {% for categoria in categorias %}
                        <option value="{{ categoria.id_categoria }}">{{ categoria.nombre }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-4 mb-3">
                    <label class="form-label">Laboratorio</label>
                    <select class="form-select" name="id_laboratorio">
                        <option value="">Seleccionar laboratorio...</option>
                        {% for laboratorio in laboratorios %}
                        <option value="{{ laboratorio.id_laboratorio }}">{{ laboratorio.nombre }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>
            
            <div class="row">
                <div class="col-md-4 mb-3">
                    <label class="form-label">Presentación</label>
                    <input type="text" class="form-control" name="presentacion" placeholder="Ej: Tableta, Jarabe, etc.">
                </div>
                <div class="col-md-4 mb-3">
                    <label class="form-label">Concentración</label>
                    <input type="text" class="form-control" name="concentracion" placeholder="Ej: 500mg, 100ml, etc.">
                </div>
                <div class="col-md-4 mb-3">
                    <label class="form-label">Fecha de Vencimiento</label>
                    <input type="date" class="form-control" name="fecha_vencimiento">
                </div>
            </div>
            
            <div class="row">
                <div class="col-md-3 mb-3">
                    <label class="form-label">Precio de Compra *</label>
                    <input type="number" class="form-control" name="precio_compra" step="0.01" required>
                </div>
                <div class="col-md-3 mb-3">
                    <label class="form-label">Precio de Venta *</label>
                    <input type="number" class="form-control" name="precio_venta" step="0.01" required>
                </div>
                <div class="col-md-3 mb-3">
                    <label class="form-label">Stock Inicial</label>
                    <input type="number" class="form-control" name="stock_actual" value="0">
                </div>
                <div class="col-md-3 mb-3">
                    <label class="form-label">Stock Mínimo</label>
                    <input type="number" class="form-control" name="stock_minimo" value="5">
                </div>
            </div>
            
            <div class="row">
                <div class="col-md-6 mb-3">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" name="requiere_receta" id="requiere_receta">
                        <label class="form-check-label" for="requiere_receta">
                            Requiere Receta Médica
                        </label>
                    </div>
                </div>
                <div class="col-md-6 mb-3">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" name="activo" id="activo" checked>
                        <label class="form-check-label" for="activo">
                            Activo
                        </label>
                    </div>
                </div>
            </div>
            
            <div class="text-end">
                <a href="{{ url_for('productos.listar') }}" class="btn btn-secondary">Cancelar</a>
                <button type="submit" class="btn btn-primary">
                    <i class="fas fa-save"></i> Guardar Producto
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
